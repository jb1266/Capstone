version: 0.0
os: linux
files:
  - source: /
    destination: /home/ubuntu/CapstoneProject
hooks:
  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
  AfterInstall:
    - location: scripts/start_server.sh
      timeout: 300
  AfterDeploy:
    - location: scripts/test_script.sh
      timeout: 300
