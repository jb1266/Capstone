<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IllinBois WholeSale Market</title>
    <style>
        /* Base Styles */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f9f9f9; color: #333; }
        
        /* Navigation */
        header { background-color: #2e7d32; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position:sticky; }
        .logo { font-size: 1.5rem; font-weight: bold; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: 500; }
        nav a:hover { text-decoration: underline; }

        /* Hero Banner */
        .hero { background-color: #e8f5e9; padding: 40px 20px; text-align: center; border-bottom: 2px solid #c8e6c9; }
        .hero h1 { margin: 0; color: #1b5e20; font-size: 2.5rem; }
        .hero p { font-size: 1.1rem; color: #4caf50; }

        /* Store Layout */
        .main-container { display: flex; max-width: 1200px; margin: 20px auto; padding: 0 20px; gap: 30px; }
        
        /* Sidebar Categories */
        .sidebar { width: 200px; flex-shrink: 0; }
        .sidebar h3 { border-bottom: 2px solid #2e7d32; padding-bottom: 10px; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { padding: 10px 0; border-bottom: 1px solid #eee; cursor: pointer; color: #2e7d32; }
        .sidebar li:hover { font-weight: bold; }

        /* Product Grid */
        .product-grid { flex-grow: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        /* Product Card */
        .product-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; text-align: center; transition: box-shadow 0.3s; }
        .product-card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .product-icon { font-size: 3rem; margin-bottom: 10px; display: block; }
        .product-name { font-size: 1.2rem; font-weight: bold; margin: 10px 0; }
        .product-price { color: #2e7d32; font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; }
        .buy-btn { background-color: #ff9800; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .buy-btn:hover { background-color: #f57c00; }

        footer { text-align: center; padding: 40px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">IllinBois Market</div>
        <nav>
            <a href="#">Shop</a>
            <a href="#">Deals</a>
            <a href="#">My Orders</a>
            <a href="#">Cart (0)</a>
        </nav>
    </header>

    <div class="hero">
        <h1>Freshness Delivered to Your Door</h1>
        <p>Locally sourced produce at wholesale prices.</p>
    </div>

    <div class="main-container">
        <aside class="sidebar">
            <h3>Categories</h3>
            <ul>
                <li>All Produce</li>
                <li>Fruits</li>
                <li>Vegetables</li>
                <li>Organic</li>
            </ul>
        </aside>

        <section class="product-grid" id="productGrid">
            </section>
    </div>

    <footer>
        &copy; 2026 FreshRoute Grocery - 123 Farm Way, Fair Oaks, VA
    </footer>

    <script>
        // Fetch data from our Node.js API
        fetch('/api/produce')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('productGrid');
                data.forEach(item => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <span class="product-icon">📦</span>
                            <div class="product-name">\${item.Produce_Name}</div>
                            <div class="product-price">$\${item.Produce_Price.toFixed(2)}</div>
                            <div style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">
                                In Stock: \${item.Produce_Quantity}
                            </div>
                            <button class="buy-btn">Add to Cart</button>
                        </div>
                    `;
                });
            })
            .catch(err => console.error('Error loading products:', err));
    </script>
</body>
</html>
